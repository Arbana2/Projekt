
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  PRODUKTI {
    int product_id PK
    string emertim
    string kategori
    string brand
    string model
    float cmim_blerje
    float cmim_shitje
    int sasi_magazine
    string status
  }
  PUNONJESI {
    int employee_id PK
    string emer
    string mbiemer
    string departament
    string pozicion
    float paga_baze
    int ore_shtese
    string orari_pune
    string statusi
  }
  KLIENTI {
    int client_id PK
    string emer_klienti
    string telefon
    string email
    float vlera_totale
    string statusi_pageses
  }
  FURNITORI {
    int furnitor_id PK
    string emertim
    string kontakt
    string kontrata
    date data_furnizimi
  }
  FATURA {
    int fatura_id PK
    int client_id FK
    int employee_id FK
    date data
    float vlera_totale
    string statusi_pageses
  }
  FATURA_DETAJE {
    int detaj_id PK
    int fatura_id FK
    int product_id FK
    int sasi
    float cmim_njesi
  }
  POROSIA_FURNITOR {
    int porosi_id PK
    int furnitor_id FK
    int product_id FK
    date data_porosise
    int sasi
    float cmim_total
  }
  PREZENCA {
    int prezenca_id PK
    int employee_id FK
    date data
    time ore_hyrje
    time ore_dalje
    int ore_shtese
  }

  KLIENTI ||--o{ FATURA : "bën"
  PUNONJESI ||--o{ FATURA : "lëshon"
  FATURA ||--|{ FATURA_DETAJE : "përmban"
  PRODUKTI ||--o{ FATURA_DETAJE : "figuron në"
  FURNITORI ||--o{ POROSIA_FURNITOR : "pranon"
  PRODUKTI ||--o{ POROSIA_FURNITOR : "porositet në"
  PUNONJESI ||--o{ PREZENCA : "regjistron"
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
